<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja Moderna VR - Final Quest</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <script>
    let cart = [];
    let cartTotal = 0;
    let lastAssistantState = '';
    let audioUnlocked = false;
    let inspectActive = false;
    let inspectedEl = null;
    let inspectedOriginal = null;
    let faceReady = false;

    const productPrices = {
      "Notebook X-Pro": 8499,
      "Phone Vision": 5999,
      "Headphone Neo": 1499,
      "Earbuds Air": 899,
      "Speaker Orb": 1299,
      "Smart Display": 2199,
      "Mini Phone": 3499,
      "VR Pod": 3299,
      "Pulse Buds": 999
    };

    function formatBRL(value) {
      return 'R$ ' + value.toLocaleString('pt-BR');
    }

    function setText(id, value) {
      const el = document.querySelector(id);
      if (el) el.setAttribute('value', value);
    }

    function updateCart() {
      if (cart.length === 0) {
        setText('#cartItems', 'Carrinho vazio');
        setText('#cartCount', '0 itens');
        setText('#cartTotal', 'Total: R$ 0');
        setText('#checkoutList', 'Nenhum item selecionado');
        setText('#checkoutTotal', 'Aproxime-se');
      } else {
        setText('#cartItems', cart.join(' • '));
        setText('#cartCount', cart.length + ' itens');
        setText('#cartTotal', 'Total: ' + formatBRL(cartTotal));
        setText('#checkoutList', cart.join(' • '));
        setText('#checkoutTotal', faceReady ? formatBRL(cartTotal) : 'Aproxime-se');
      }
    }

    function showMessage(text, delay = 2200) {
      const panel = document.querySelector('#globalMessagePanel');
      const textEl = document.querySelector('#globalMessage');
      if (!panel || !textEl) return;

      textEl.setAttribute('value', text);
      panel.setAttribute('visible', 'true');

      clearTimeout(window.__msgTimer);
      window.__msgTimer = setTimeout(() => {
        panel.setAttribute('visible', 'false');
      }, delay);
    }

    function unlockAudioAndPlayAmbient() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      const ambient = document.querySelector('#ambientSound');
      if (ambient && ambient.components && ambient.components.sound) {
        try {
          ambient.components.sound.playSound();
        } catch (e) {}
      }
    }

    function playSound(id) {
      unlockAudioAndPlayAmbient();
      const el = document.querySelector(id);
      if (el && el.components && el.components.sound) {
        try {
          el.components.sound.stopSound();
          el.components.sound.playSound();
        } catch (e) {}
      }
    }

    function inspectProduct(el, name) {
      if (inspectActive && inspectedEl === el) {
        returnProduct();
        return;
      }

      if (inspectActive && inspectedEl !== el) {
        returnProduct();
      }

      const rig = document.querySelector('#rig');
      if (!rig) return;

      inspectActive = true;
      inspectedEl = el;

      inspectedOriginal = {
        parent: el.parentNode,
        position: Object.assign({}, el.getAttribute('position')),
        rotation: Object.assign({}, el.getAttribute('rotation') || {x:0,y:0,z:0}),
        scale: Object.assign({}, el.getAttribute('scale') || {x:1,y:1,z:1})
      };

      const camera = document.querySelector('#camera');
      camera.appendChild(el);
      el.setAttribute('position', '0 -0.05 -1.4');
      el.setAttribute('rotation', '0 0 0');
      el.setAttribute('scale', '1.4 1.4 1.4');
      el.setAttribute('inspect-spin', '');
      setText('#inspectTitle', name);
      setText('#inspectHint', 'Clique novamente no produto para devolvê-lo');
      document.querySelector('#inspectPanel').setAttribute('visible', 'true');
      showMessage('Modo de exibição ativado: ' + name, 2200);
      playSound('#clickSound');
    }

    function returnProduct() {
      if (!inspectActive || !inspectedEl || !inspectedOriginal) return;

      inspectedEl.removeAttribute('inspect-spin');
      inspectedOriginal.parent.appendChild(inspectedEl);
      inspectedEl.setAttribute('position', inspectedOriginal.position);
      inspectedEl.setAttribute('rotation', inspectedOriginal.rotation);
      inspectedEl.setAttribute('scale', inspectedOriginal.scale);

      inspectActive = false;
      inspectedEl = null;
      inspectedOriginal = null;
      document.querySelector('#inspectPanel').setAttribute('visible', 'false');
      showMessage('Produto devolvido.', 1400);
    }

    AFRAME.registerComponent('inspect-spin', {
      tick: function (time, delta) {
        const rot = this.el.getAttribute('rotation');
        this.el.setAttribute('rotation', {
          x: rot.x,
          y: rot.y + (24 * delta / 1000),
          z: rot.z
        });
      }
    });

    AFRAME.registerComponent('float-rotate', {
      schema: { yoffset: { default: 0.025 }, speed: { default: 1.0 }, rot: { default: 8 } },
      init: function () {
        this.baseY = this.el.object3D.position.y;
      },
      tick: function (time, delta) {
        if (inspectActive && inspectedEl === this.el) return;
        const p = this.el.object3D.position;
        p.y = this.baseY + Math.sin(time / 700 * this.data.speed) * this.data.yoffset;

        const r = this.el.getAttribute('rotation');
        this.el.setAttribute('rotation', {
          x: r.x,
          y: r.y + (this.data.rot * delta / 1000),
          z: r.z
        });
      }
    });

    AFRAME.registerComponent('soft-pulse-light', {
      schema: { min: { default: 0.05 }, max: { default: 0.16 }, speed: { default: 1.2 } },
      tick: function (time) {
        const intensity = this.data.min + ((Math.sin(time / 500 * this.data.speed) + 1) / 2) * (this.data.max - this.data.min);
        this.el.setAttribute('light', 'intensity', intensity);
      }
    });

    AFRAME.registerComponent('product-card', {
      schema: {
        product: { type: 'string' },
        price: { type: 'string' },
        info: { type: 'string' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();
          playSound('#clickSound');

          const productName = this.data.product;
          cart.push(productName);
          cartTotal += productPrices[productName] || 0;

          updateCart();
          setText('#infoTitle', productName);
          setText('#infoBody', this.data.info);
          setText('#selectedPrice', this.data.price);
          setText('#checkoutStatus', 'Produto adicionado ao carrinho');
          showMessage(productName + ' adicionado ao carrinho!');
        });
      }
    });

    AFRAME.registerComponent('inspectable-product', {
      schema: {
        name: { type: 'string' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();
          inspectProduct(this.el, this.data.name);
        });
      }
    });

    AFRAME.registerComponent('assistant-panel', {
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();
          playSound('#clickSound');
          const msg = 'Use o analógico esquerdo para andar. Clique nos produtos para adicionar ao carrinho. Os três produtos centrais podem ser exibidos em destaque.';
          setText('#assistantSpeech', msg);
          setText('#infoTitle', 'Assistente Virtual');
          setText('#infoBody', msg);
          setText('#selectedPrice', 'Assistente online');
          showMessage('Assistente virtual ativado.');
        });
      }
    });

    AFRAME.registerComponent('assistant-proximity', {
      init: function () {
        this.rig = document.querySelector('#rig');
      },
      tick: function () {
        if (!this.rig) return;
        const rigPos = new AFRAME.THREE.Vector3();
        const assistantPos = new AFRAME.THREE.Vector3();
        this.rig.object3D.getWorldPosition(rigPos);
        this.el.object3D.getWorldPosition(assistantPos);
        const distance = rigPos.distanceTo(assistantPos);

        let state = '';
        let message = '';

        if (distance < 2.1) {
          if (rigPos.z > -4.5) {
            state = 'entrada';
            message = 'Bem-vindo à Loja Moderna VR. Entre e explore a vitrine futurista.';
          } else if (rigPos.z > -8.8) {
            state = 'produtos';
            message = 'Você está na área principal. Agora os três produtos centrais podem ser vistos em destaque na vitrine.';
          } else {
            state = 'caixa';
            message = 'Você está perto do caixa. Confira o resumo da compra e finalize com pagamento facial.';
          }
        }

        if (state !== '' && state !== lastAssistantState) {
          lastAssistantState = state;
          setText('#assistantSpeech', message);
          setText('#infoTitle', 'Assistente Virtual');
          setText('#infoBody', message);
          setText('#selectedPrice', 'Ajuda automática');
          showMessage('Assistente: ' + message, 3200);
        }

        if (state === '' && lastAssistantState !== '') {
          lastAssistantState = '';
          setText('#assistantSpeech', 'Aproxime-se para receber orientações do assistente virtual.');
        }
      }
    });

    AFRAME.registerComponent('assistant-core-pulse', {
      tick: function (time) {
        const scale = 1 + Math.sin(time / 250) * 0.06;
        this.el.setAttribute('scale', `${scale} ${scale} ${scale}`);
      }
    });

    AFRAME.registerComponent('assistant-look', {
      init: function () {
        this.rig = document.querySelector('#rig');
      },
      tick: function () {
        if (!this.rig) return;
        const rigPos = new AFRAME.THREE.Vector3();
        const myPos = new AFRAME.THREE.Vector3();
        this.rig.object3D.getWorldPosition(rigPos);
        this.el.object3D.getWorldPosition(myPos);
        const dx = rigPos.x - myPos.x;
        const dz = rigPos.z - myPos.z;
        const angle = Math.atan2(dx, dz) * 180 / Math.PI;
        this.el.setAttribute('rotation', `0 ${angle} 0`);
      }
    });

    

function refreshCanvasTexture(el) {
      if (!el) return;
      const mesh = el.getObject3D && el.getObject3D('mesh');
      if (mesh && mesh.material && mesh.material.map) mesh.material.map.needsUpdate = true;
      if (el.components && el.components.material && el.components.material.material && el.components.material.material.map) {
        el.components.material.material.map.needsUpdate = true;
      }
    }

    function vrRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
    }

    function vrDrawDevice(ctx, kind, x, y, w, h, accent) {
      ctx.save();
      ctx.translate(x, y);
      if (kind === 'notebook') {
        ctx.lineWidth = 8;
        vrRoundedRect(ctx, 55, 20, w - 110, h - 120, 26, '#08111f', accent);
        const g = ctx.createLinearGradient(80, 45, w - 80, h - 130);
        g.addColorStop(0, accent);
        g.addColorStop(1, '#e9f8ff');
        vrRoundedRect(ctx, 85, 50, w - 170, h - 180, 18, g, null);
        vrRoundedRect(ctx, 20, h - 90, w - 40, 45, 18, '#0f172a', accent);
        vrRoundedRect(ctx, w / 2 - 45, h - 72, 90, 10, 6, accent, null);
      } else if (kind === 'phone') {
        ctx.lineWidth = 8;
        vrRoundedRect(ctx, w / 2 - 105, 18, 210, h - 36, 36, '#06111e', accent);
        const g = ctx.createLinearGradient(w / 2 - 70, 60, w / 2 + 60, h - 100);
        g.addColorStop(0, accent);
        g.addColorStop(1, '#effbff');
        vrRoundedRect(ctx, w / 2 - 82, 42, 164, h - 104, 24, g, null);
        vrRoundedRect(ctx, w / 2 - 30, 28, 60, 8, 5, 'rgba(255,255,255,0.5)', null);
        vrRoundedRect(ctx, w / 2 - 48, h - 76, 96, 16, 8, 'rgba(255,255,255,0.9)', null);
      } else if (kind === 'headphone') {
        ctx.lineWidth = 26;
        ctx.strokeStyle = accent;
        ctx.beginPath();
        ctx.arc(w / 2, h / 2 - 30, 135, Math.PI * 1.05, Math.PI * 1.95, false);
        ctx.stroke();
        ctx.lineWidth = 8;
        vrRoundedRect(ctx, w / 2 - 190, h / 2 - 10, 70, 150, 28, '#08111f', accent);
        vrRoundedRect(ctx, w / 2 + 120, h / 2 - 10, 70, 150, 28, '#08111f', accent);
        ctx.fillStyle = accent;
        ctx.globalAlpha = 0.18;
        ctx.beginPath();
        ctx.arc(w / 2, h / 2 - 10, 72, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (kind === 'vr') {
        ctx.lineWidth = 10;
        vrRoundedRect(ctx, 80, h / 2 - 70, w - 160, 140, 62, '#08111f', accent);
        const g = ctx.createLinearGradient(120, h / 2 - 30, 260, h / 2 + 20);
        g.addColorStop(0, accent);
        g.addColorStop(1, '#effbff');
        vrRoundedRect(ctx, 120, h / 2 - 34, 150, 70, 26, g, null);
        vrRoundedRect(ctx, w - 270, h / 2 - 34, 150, 70, 26, g, null);
        vrRoundedRect(ctx, w / 2 - 46, h / 2 - 46, 92, 92, 22, '#0f172a', accent);
        ctx.strokeStyle = accent;
        ctx.beginPath();
        ctx.moveTo(60, h / 2);
        ctx.lineTo(130, h / 2 - 14);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(w - 60, h / 2);
        ctx.lineTo(w - 130, h / 2 - 14);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTvCanvas(slide) {
      const canvas = document.getElementById('tvCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      const accent = slide.accent;

      ctx.clearRect(0, 0, w, h);
      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, '#061120');
      bg.addColorStop(1, '#02060d');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = 'rgba(56,189,248,0.08)';
      ctx.beginPath(); ctx.arc(w - 120, 90, 140, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(w - 40, h - 30, 170, 0, Math.PI * 2); ctx.fill();

      ctx.globalAlpha = 0.24;
      ctx.lineWidth = 4;
      vrRoundedRect(ctx, 18, 18, w - 36, h - 36, 24, null, accent);
      ctx.globalAlpha = 1;

      vrRoundedRect(ctx, 40, 42, 410, h - 84, 22, 'rgba(7,19,34,0.92)', null);
      vrRoundedRect(ctx, 60, 64, 170, 40, 20, 'rgba(56,189,248,0.18)', accent);
      ctx.fillStyle = '#eefbff';
      ctx.textAlign = 'center';
      ctx.font = '700 24px Arial';
      ctx.fillText(slide.tag, 145, 91);

      ctx.textAlign = 'left';
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 44px Arial';
      ctx.fillText(slide.title, 60, 165);
      ctx.fillStyle = '#d8ebf8';
      ctx.font = '26px Arial';
      ctx.fillText(slide.subtitle, 60, 205);
      ctx.fillStyle = accent;
      ctx.font = '700 18px Arial';
      ctx.fillText('Destaque da vitrine interativa', 60, 245);

      const line = ctx.createLinearGradient(60, 0, 380, 0);
      line.addColorStop(0, 'rgba(0,0,0,0)');
      line.addColorStop(0.5, accent);
      line.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = line;
      ctx.fillRect(60, 274, 320, 3);

      const features = [slide.feature1, slide.feature2, slide.feature3];
      ctx.font = '700 22px Arial';
      features.forEach((item, i) => {
        ctx.fillStyle = i === 0 ? '#eef7ff' : '#c9d7ea';
        ctx.fillText('• ' + item, 72, 338 + (i * 46));
      });

      vrRoundedRect(ctx, 60, h - 110, 220, 52, 26, 'rgba(56,189,248,0.18)', accent);
      ctx.fillStyle = '#eefbff';
      ctx.textAlign = 'center';
      ctx.font = '700 22px Arial';
      ctx.fillText('Loja Moderna VR', 170, h - 77);

      vrRoundedRect(ctx, 505, 70, 470, 436, 26, 'rgba(10,18,32,0.95)', 'rgba(56,189,248,0.22)');
      vrDrawDevice(ctx, slide.kind, 520, 105, 440, 360, accent);
      ctx.globalAlpha = 0.10;
      vrRoundedRect(ctx, 520, 105, 440, 360, 24, accent, null);
      ctx.globalAlpha = 1;
      vrRoundedRect(ctx, 560, 482, 362, 40, 20, 'rgba(56,189,248,0.16)', null);
      ctx.fillStyle = '#eefbff';
      ctx.font = '700 21px Arial';
      ctx.fillText(slide.price, 741, 508);
    }

    function drawPosterCanvas(canvasId, config) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, '#070f1d');
      bg.addColorStop(1, '#02060d');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
      ctx.lineWidth = 4;
      vrRoundedRect(ctx, 20, 20, w - 40, h - 40, 28, null, config.accent);
      ctx.globalAlpha = 0.18;
      vrRoundedRect(ctx, 34, 34, w - 68, h - 68, 24, config.accent, null);
      ctx.globalAlpha = 1;
      vrDrawDevice(ctx, config.kind, 50, 110, w - 100, 260, config.accent);
      ctx.fillStyle = '#f5f8ff';
      ctx.textAlign = 'center';
      ctx.font = '700 32px Arial';
      ctx.fillText(config.title, w / 2, 72);
      ctx.fillStyle = '#c8d8e8';
      ctx.font = '24px Arial';
      ctx.fillText(config.subtitle, w / 2, h - 48);
    }

    function drawProductCanvas(canvasId, config) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, '#07101d');
      bg.addColorStop(1, '#091425');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
      ctx.lineWidth = 3;
      vrRoundedRect(ctx, 14, 14, w - 28, h - 28, 24, null, config.accent);
      vrDrawDevice(ctx, config.kind, 40, 45, w - 80, h - 90, config.accent);
    }

    AFRAME.registerComponent('display-assets-init', {
      init: function () {
        drawPosterCanvas('posterAudioCanvas', { title: 'Coleção Áudio', subtitle: 'Som com estilo futurista', accent: '#8b5cf6', kind: 'headphone' });
        drawPosterCanvas('posterMobileCanvas', { title: 'Linha Mobile', subtitle: 'Design premium e inovação', accent: '#67e8f9', kind: 'phone' });
        drawProductCanvas('prodCanvasNotebook', { accent: '#38bdf8', kind: 'notebook' });
        drawProductCanvas('prodCanvasPhone', { accent: '#67e8f9', kind: 'phone' });
        drawProductCanvas('prodCanvasHeadphone', { accent: '#a78bfa', kind: 'headphone' });

        setTimeout(() => {
          refreshCanvasTexture(document.querySelector('#posterAudioFrame'));
          refreshCanvasTexture(document.querySelector('#posterMobileFrame'));
          refreshCanvasTexture(document.querySelector('#cardNotebookFrame'));
          refreshCanvasTexture(document.querySelector('#cardPhoneFrame'));
          refreshCanvasTexture(document.querySelector('#cardHeadphoneFrame'));
        }, 400);
      }
    });

    AFRAME.registerComponent('face-zone', {


      init: function () {
        this.rig = document.querySelector('#rig');
        this.active = false;
      },
      tick: function () {
        if (!this.rig) return;
        const zonePos = new AFRAME.THREE.Vector3();
        const rigPos = new AFRAME.THREE.Vector3();
        this.el.object3D.getWorldPosition(zonePos);
        this.rig.object3D.getWorldPosition(rigPos);
        const d = zonePos.distanceTo(rigPos);

        const ring = document.querySelector('#scanFloorRing');
        const status = document.querySelector('#scanStatus');
        const badge = document.querySelector('#payBadge');

        if (d < 2.05) {
          faceReady = true;
          if (!this.active) {
            this.active = true;
            if (ring) ring.setAttribute('color', '#22c55e');
            if (status) status.setAttribute('value', 'Rosto detectado');
            if (badge) badge.setAttribute('value', 'Autenticação facial pronta');
            setText('#checkoutStatus', 'Pagamento com reconhecimento facial pronto');
            if (cart.length > 0) setText('#checkoutTotal', formatBRL(cartTotal));
            showMessage('Pagamento com reconhecimento facial pronto.');
          }
        } else {
          this.active = false;
          faceReady = false;
          if (ring) ring.setAttribute('color', '#86efac');
          if (status) status.setAttribute('value', 'Fique na área verde para autenticar');
          if (badge) badge.setAttribute('value', 'Pagamento com reconhecimento facial');
          setText('#checkoutTotal', 'Aproxime-se');
        }
      }
    });

    AFRAME.registerComponent('finish-purchase', {
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();

          if (cart.length === 0) {
            playSound('#clickSound');
            setText('#checkoutStatus', 'Carrinho vazio');
            showMessage('Seu carrinho está vazio.');
            return;
          }

          if (!faceReady) {
            playSound('#clickSound');
            setText('#checkoutStatus', 'Faça a autenticação facial');
            showMessage('Aproxime-se da área verde para autenticar o rosto.');
            return;
          }

          playSound('#buySound');
          setText('#infoTitle', 'Compra aprovada!');
          setText('#infoBody', 'Itens comprados: ' + cart.join(', '));
          setText('#selectedPrice', 'Total pago: ' + formatBRL(cartTotal));
          setText('#checkoutStatus', 'Pagamento concluído com sucesso');
          showMessage('Compra finalizada com sucesso!');

          const okBadge = document.querySelector('#approvalBadge');
          const okIcon = document.querySelector('#approvalIcon');
          const okText = document.querySelector('#approvalText');
          const ring = document.querySelector('#scanFloorRing');
          const status = document.querySelector('#scanStatus');
          const badge = document.querySelector('#payBadge');

          if (okBadge) okBadge.setAttribute('visible', 'true');
          if (okIcon) okIcon.setAttribute('visible', 'true');
          if (okText) okText.setAttribute('visible', 'true');

          setTimeout(() => {
            if (okBadge) okBadge.setAttribute('visible', 'false');
            if (okIcon) okIcon.setAttribute('visible', 'false');
            if (okText) okText.setAttribute('visible', 'false');
          }, 2200);

          cart = [];
          cartTotal = 0;
          faceReady = false;
          if (ring) ring.setAttribute('color', '#86efac');
          if (status) status.setAttribute('value', 'Fique na área verde para autenticar');
          if (badge) badge.setAttribute('value', 'Pagamento com reconhecimento facial');
          updateCart();
        });
      }
    });

    AFRAME.registerComponent('hover-highlight', {
      schema: { glow: { type: 'selector' } },
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          this.el.setAttribute('scale', '1.06 1.06 1.06');
          if (this.data.glow) this.data.glow.setAttribute('visible', 'true');
        });

        this.el.addEventListener('mouseleave', () => {
          this.el.setAttribute('scale', '1 1 1');
          if (this.data.glow) this.data.glow.setAttribute('visible', 'false');
        });

        this.el.addEventListener('click', () => {
          this.el.setAttribute('animation__pulse', {
            property: 'scale',
            from: '1 1 1',
            to: '1.12 1.12 1.12',
            dur: 140,
            dir: 'alternate',
            loop: 1
          });
        });
      }
    });
  </script>
