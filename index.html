<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loja Moderna VR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

<script>
let cart=[];

function addItem(name){
cart.push(name);
document.querySelector("#cart").setAttribute("value","Carrinho: "+cart.join(", "));
}

function buy(){
if(cart.length==0){
document.querySelector("#info").setAttribute("value","Carrinho vazio");
return;
}

document.querySelector("#info").setAttribute("value","Compra aprovada ✔");
cart=[];
document.querySelector("#cart").setAttribute("value","Carrinho vazio");
}
</script>

</head>

<body>

<a-scene background="color:#07101b">

<a-light type="ambient" intensity="0.8"></a-light>
<a-light type="point" position="0 4 -4" intensity="0.6"></a-light>

<a-sky color="#07101b"></a-sky>

<a-plane rotation="-90 0 0" width="20" height="20" color="#111827"></a-plane>

<a-box position="0 2.5 -10" width="20" height="5" depth="0.2" color="#14294f"></a-box>

<!-- TV -->
<a-box position="0 2.7 -9.8" width="6" height="2" depth="0.1" color="black"></a-box>
<a-text value="DESTAQUES DA LOJA" position="0 3.4 -9.7" align="center" width="6"></a-text>

<!-- mesa -->
<a-box position="0 0.8 -5" width="7" height="1.5" depth="2" color="#e5e7eb"></a-box>

<!-- produto 1 -->
<a-box position="-2 1.6 -5" depth="0.6" height="0.05" width="1" color="#334155"></a-box>

<a-box position="-2 1.8 -5" depth="0.2" height="0.4" width="0.6" color="#111827"></a-box>

<a-box class="clickable"
onclick="addItem('Notebook')"
position="-2 0.6 -4.3"
width="1.4"
height="0.4"
depth="0.3"
color="#059669">
</a-box>

<a-text value="Notebook R$8499"
position="-2 2.2 -4.2"
align="center"></a-text>

<!-- produto 2 -->
<a-box position="0 1.6 -5" depth="0.6" height="0.05" width="1" color="#334155"></a-box>

<a-box position="0 1.9 -5" depth="0.1" height="0.6" width="0.3" color="black"></a-box>

<a-box class="clickable"
onclick="addItem('Phone')"
position="0 0.6 -4.3"
width="1.4"
height="0.4"
depth="0.3"
color="#2563eb">
</a-box>

<a-text value="Phone R$5999"
position="0 2.2 -4.2"
align="center"></a-text>

<!-- produto 3 -->
<a-box position="2 1.6 -5" depth="0.6" height="0.05" width="1" color="#334155"></a-box>

<a-sphere position="2 1.9 -5" radius="0.3" color="#111827"></a-sphere>

<a-box class="clickable"
onclick="addItem('Headphone')"
position="2 0.6 -4.3"
width="1.4"
height="0.4"
depth="0.3"
color="#7c3aed">
</a-box>

<a-text value="Headphone R$1499"
position="2 2.2 -4.2"
align="center"></a-text>

<!-- assistente -->
<a-cylinder position="0 1 -7.5" radius="0.2" height="1.2" color="#9ca3af"></a-cylinder>
<a-sphere position="0 1.7 -7.5" radius="0.25" color="#e5e7eb"></a-sphere>

<a-text value="Assistente VR"
position="0 2.3 -7.5"
align="center"></a-text>

<!-- caixa -->
<a-box position="0 1 -9" width="3" height="1.5" depth="1" color="#0f172a"></a-box>

<a-box class="clickable"
onclick="buy()"
position="0 0.4 -8.2"
width="2"
height="0.4"
depth="0.3"
color="#16a34a"></a-box>

<a-text value="Finalizar compra"
position="0 0.45 -8"
align="center"></a-text>

<!-- painéis -->
<a-text id="cart"
value="Carrinho vazio"
position="4 2 -8"
width="4"></a-text>

<a-text id="info"
value="Aponte e aperte o gatilho"
position="-4 2 -8"
width="4"></a-text>

<!-- RIG COM ANALOGICO -->
<a-entity
id="rig"
position="0 1.6 0"
movement-controls="speed:0.2">

<a-entity camera look-controls></a-entity>

<a-entity
laser-controls="hand: left"
raycaster="objects: .clickable">
</a-entity>

<a-entity
laser-controls="hand: right"
raycaster="objects: .clickable">
</a-entity>

</a-entity>

</a-scene>

</body>
</html>
