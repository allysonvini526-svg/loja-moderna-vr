<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja Moderna VR - V5.3</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <script>
    let cart = [];

    function setText(id, value) {
      const el = document.querySelector(id);
      if (el) el.setAttribute('value', value);
    }

    function updateCart() {
      if (cart.length === 0) {
        setText('#cartItems', 'Carrinho vazio');
        setText('#cartCount', '0 itens');
      } else {
        setText('#cartItems', cart.join(' • '));
        setText('#cartCount', cart.length + ' itens');
      }
    }

    function showMessage(text, delay = 2200) {
      setText('#globalMessage', text);
      clearTimeout(window.__msgTimer);
      window.__msgTimer = setTimeout(() => {
        setText('#globalMessage', 'Use os controles do VR ou clique nos botoes para interagir.');
      }, delay);
    }

    AFRAME.registerComponent('float-rotate', {
      schema: {
        yoffset: { default: 0.03 },
        speed: { default: 1.2 },
        rot: { default: 10 }
      },
      init: function () {
        this.baseY = this.el.object3D.position.y;
      },
      tick: function (time, delta) {
        const pos = this.el.object3D.position;
        pos.y = this.baseY + Math.sin(time / 700 * this.data.speed) * this.data.yoffset;

        const r = this.el.getAttribute('rotation');
        this.el.setAttribute('rotation', {
          x: r.x,
          y: r.y + (this.data.rot * delta / 1000),
          z: r.z
        });
      }
    });

    AFRAME.registerComponent('soft-pulse-light', {
      schema: {
        min: { default: 0.08 },
        max: { default: 0.24 },
        speed: { default: 1.2 }
      },
      tick: function (time) {
        const intensity = this.data.min + ((Math.sin(time / 500 * this.data.speed) + 1) / 2) * (this.data.max - this.data.min);
        this.el.setAttribute('light', 'intensity', intensity);
      }
    });

    AFRAME.registerComponent('product-card', {
      schema: {
        product: { type: 'string' },
        price: { type: 'string' },
        info: { type: 'string' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          cart.push(this.data.product);
          updateCart();
          setText('#infoTitle', this.data.product);
          setText('#infoBody', this.data.info);
          setText('#selectedPrice', this.data.price);
          showMessage(this.data.product + ' adicionado ao carrinho!');
        });
      }
    });

    AFRAME.registerComponent('assistant-panel', {
      schema: {
        title: { type: 'string' },
        info: { type: 'string' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          setText('#infoTitle', this.data.title);
          setText('#infoBody', this.data.info);
          showMessage('Assistente virtual ativado.', 1800);
        });
      }
    });

    AFRAME.registerComponent('tv-showcase', {
      init: function () {
        this.slides = [
          { title: 'Notebook X-Pro', body: 'Alta performance • R$ 8.499' },
          { title: 'Phone Vision', body: 'Camera holografica • R$ 5.999' },
          { title: 'Headphone Neo', body: 'Som imersivo • R$ 1.499' },
          { title: 'VR Pod', body: 'Experiencia VR • R$ 3.299' }
        ];
        this.index = 0;
        this.lastSwitch = 0;
      },
      tick: function (time) {
        if (time - this.lastSwitch > 2400) {
          this.index = (this.index + 1) % this.slides.length;
          const item = this.slides[this.index];
          setText('#tvTitle', item.title);
          setText('#tvBody', item.body);
          this.lastSwitch = time;
        }
      }
    });

    AFRAME.registerComponent('face-scan-advanced', {
      init: function () {
        this.rig = document.querySelector('#rig');
        this.active = false;
      },
      tick: function () {
        if (!this.rig) return;

        const zonePos = new AFRAME.THREE.Vector3();
        const camPos = new AFRAME.THREE.Vector3();

        this.el.object3D.getWorldPosition(zonePos);
        this.rig.object3D.getWorldPosition(camPos);

        const d = zonePos.distanceTo(camPos);

        const ring1 = document.querySelector('#scanRingMain');
        const ring2 = document.querySelector('#scanRingOuter');
        const beam = document.querySelector('#scanBeam');
        const status = document.querySelector('#scanStatus');
        const badge = document.querySelector('#payBadge');
        const floorRing = document.querySelector('#scanFloorRing');

        if (d < 2.15) {
          if (!this.active) {
            this.active = true;
            setText('#scanStatus', 'Rosto detectado');
            setText('#payBadge', 'Autenticacao facial pronta');
            if (floorRing) floorRing.setAttribute('color', '#22c55e');
            showMessage('Escaneamento facial detectado.', 1700);
          }
          if (ring1) ring1.setAttribute('visible', 'true');
          if (ring2) ring2.setAttribute('visible', 'true');
          if (beam) beam.setAttribute('visible', 'true');
        } else {
          this.active = false;
          if (status) status.setAttribute('value', 'Aproxime-se da area marcada');
          if (badge) badge.setAttribute('value', 'Pagamento facial');
          if (floorRing) floorRing.setAttribute('color', '#86efac');
          if (ring1) ring1.setAttribute('visible', 'false');
          if (ring2) ring2.setAttribute('visible', 'false');
          if (beam) beam.setAttribute('visible', 'false');
        }
      }
    });

    AFRAME.registerComponent('finish-purchase', {
      init: function () {
        this.el.addEventListener('click', () => {
          if (cart.length === 0) {
            showMessage('Seu carrinho esta vazio.', 1800);
            return;
          }

          setText('#infoTitle', 'Compra concluida');
          setText('#infoBody', 'Itens comprados: ' + cart.join(', '));
          setText('#selectedPrice', 'Pagamento aprovado');
          showMessage('Compra finalizada com sucesso!', 2500);

          const badge = document.querySelector('#approvalBadge');
          const glow = document.querySelector('#approvalGlow');
          const icon = document.querySelector('#approvalIcon');
          const text = document.querySelector('#approvalText');

          if (badge) badge.setAttribute('visible', 'true');
          if (glow) glow.setAttribute('visible', 'true');
          if (icon) icon.setAttribute('visible', 'true');
          if (text) text.setAttribute('visible', 'true');

          setTimeout(() => {
            if (badge) badge.setAttribute('visible', 'false');
            if (glow) glow.setAttribute('visible', 'false');
            if (icon) icon.setAttribute('visible', 'false');
            if (text) text.setAttribute('visible', 'false');
          }, 2200);

          cart = [];
          updateCart();
        });
      }
    });
  </script>
