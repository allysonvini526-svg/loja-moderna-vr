<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loja VR Final</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>

<a-scene>

  <!-- Câmera -->
  <a-entity camera look-controls wasd-controls position="0 1.6 5">
    <a-cursor></a-cursor>
  </a-entity>

  <!-- Chão -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="#0a0a0a"></a-plane>

  <!-- Luz -->
  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="point" position="0 5 5" intensity="1"></a-light>

  <!-- Painel esquerdo -->
  <a-plane position="-4 2 -3" width="2" height="3" color="#1a1a2e" material="opacity:0.95">
  </a-plane>

  <a-text value="Fone Premium" position="-4 3 -2.9" align="center" color="#ffffff"></a-text>
  <a-text value="Som com estilo futurista" position="-4 1.2 -2.9" align="center" color="#cccccc" width="3"></a-text>

  <!-- Painel direito -->
  <a-plane position="4 2 -3" width="2" height="3" color="#1a1a2e" material="opacity:0.95"></a-plane>

  <a-text value="Linha Mobile" position="4 3 -2.9" align="center" color="#ffffff"></a-text>
  <a-text value="Design premium e inovação" position="4 1.2 -2.9" align="center" color="#cccccc" width="3"></a-text>

  <!-- TV CENTRAL FUNCIONAL -->
  <a-plane position="0 2.5 -4" width="4" height="2.5" color="#111" material="emissive:#222; emissiveIntensity:0.5"></a-plane>

  <a-text value="MAIS VENDIDO" position="0 3.2 -3.9" align="center" color="#00ffff" width="4"></a-text>

  <a-text value="Fone Gamer Pro" position="0 2.7 -3.9" align="center" color="#ffffff" width="4"></a-text>

  <a-text value="Conforto extremo, som imersivo\n e melhor custo-benefício" 
          position="0 2.2 -3.9" 
          align="center" 
          color="#cccccc" 
          width="3"></a-text>

  <!-- Mesa de produtos -->
  <a-box position="0 1 -2" depth="1" height="0.2" width="3" color="#111"></a-box>

  <!-- Produto 1 -->
  <a-box position="-1 1.3 -2" depth="0.5" height="0.5" width="0.5" color="#6a5acd"
         class="clickable"
         onclick="addCarrinho()"></a-box>

  <a-text value="Adicionar" position="-1 0.7 -2" align="center" color="#00ffcc"></a-text>

  <!-- Produto 2 -->
  <a-box position="0 1.3 -2" depth="0.5" height="0.5" width="0.5" color="#00bcd4"
         class="clickable"
         onclick="addCarrinho()"></a-box>

  <a-text value="Adicionar" position="0 0.7 -2" align="center" color="#00ffcc"></a-text>

  <!-- Produto 3 -->
  <a-box position="1 1.3 -2" depth="0.5" height="0.5" width="0.5" color="#ff4081"
         class="clickable"
         onclick="addCarrinho()"></a-box>

  <a-text value="Adicionar" position="1 0.7 -2" align="center" color="#00ffcc"></a-text>

  <!-- Caixa -->
  <a-box position="0 1 1" depth="1" height="1" width="2" color="#222"></a-box>

  <a-text value="Caixa" position="0 1.8 1" align="center" color="#ffffff"></a-text>

  <a-box position="0 1 1" depth="0.5" height="0.5" width="1" color="#00ff00"
         onclick="finalizarCompra()"></a-box>

  <a-text value="Finalizar compra" position="0 0.5 1" align="center" color="#ffffff"></a-text>

</a-scene>

<script>
let carrinho = 0;

function addCarrinho(){
  carrinho++;
  alert("Item adicionado ao carrinho!");
}

function finalizarCompra(){
  if(carrinho > 0){
    alert("Pagamento aprovado por reconhecimento facial!");
  } else {
    alert("Carrinho vazio!");
  }
}
</script>

</body>
</html>
