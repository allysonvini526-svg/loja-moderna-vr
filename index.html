<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja Moderna VR - Final Quest</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <script>
    let cart = [];
    let cartTotal = 0;
    let lastAssistantState = '';
    let audioUnlocked = false;
    let inspectActive = false;
    let inspectedEl = null;
    let inspectedOriginal = null;

    const productPrices = {
      "Notebook X-Pro": 8499,
      "Phone Vision": 5999,
      "Headphone Neo": 1499,
      "Earbuds Air": 899,
      "Speaker Orb": 1299,
      "Smart Display": 2199,
      "Mini Phone": 3499,
      "VR Pod": 3299,
      "Pulse Buds": 999
    };

    function formatBRL(value) {
      return 'R$ ' + value.toLocaleString('pt-BR');
    }

    function setText(id, value) {
      const el = document.querySelector(id);
      if (el) el.setAttribute('value', value);
    }

    function updateCart() {
      if (cart.length === 0) {
        setText('#cartItems', 'Carrinho vazio');
        setText('#cartCount', '0 itens');
        setText('#cartTotal', 'Total: R$ 0');
        setText('#checkoutList', 'Nenhum item selecionado');
      } else {
        setText('#cartItems', cart.join(' • '));
        setText('#cartCount', cart.length + ' itens');
        setText('#cartTotal', 'Total: ' + formatBRL(cartTotal));
        setText('#checkoutList', cart.join(' | '));
      }
    }

    function showMessage(text, delay = 2600) {
      setText('#globalMessage', text);
      clearTimeout(window.__msgTimer);
      window.__msgTimer = setTimeout(() => {
        setText('#globalMessage', 'Use o analogico para andar. Mire e clique para interagir.');
      }, delay);
    }

    function unlockAudioAndPlayAmbient() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      const ambient = document.querySelector('#ambientSound');
      if (ambient && ambient.components && ambient.components.sound) {
        try {
          ambient.components.sound.playSound();
        } catch (e) {}
      }
    }

    function playSound(id) {
      unlockAudioAndPlayAmbient();
      const el = document.querySelector(id);
      if (el && el.components && el.components.sound) {
        try {
          el.components.sound.stopSound();
          el.components.sound.playSound();
        } catch (e) {}
      }
    }

    function inspectProduct(el, name) {
      if (inspectActive && inspectedEl === el) {
        returnProduct();
        return;
      }

      if (inspectActive && inspectedEl !== el) {
        returnProduct();
      }

      const rig = document.querySelector('#rig');
      if (!rig) return;

      inspectActive = true;
      inspectedEl = el;

      inspectedOriginal = {
        parent: el.parentNode,
        position: Object.assign({}, el.getAttribute('position')),
        rotation: Object.assign({}, el.getAttribute('rotation') || {x:0,y:0,z:0}),
        scale: Object.assign({}, el.getAttribute('scale') || {x:1,y:1,z:1})
      };

      const camera = document.querySelector('#camera');
      camera.appendChild(el);
      el.setAttribute('position', '0 -0.05 -1.4');
      el.setAttribute('rotation', '0 0 0');
      el.setAttribute('scale', '1.4 1.4 1.4');
      el.setAttribute('inspect-spin', '');
      setText('#inspectTitle', name);
      setText('#inspectHint', 'Clique novamente no produto para devolver');
      document.querySelector('#inspectPanel').setAttribute('visible', 'true');
      showMessage('Modo de exibicao ativado: ' + name, 2200);
      playSound('#clickSound');
    }

    function returnProduct() {
      if (!inspectActive || !inspectedEl || !inspectedOriginal) return;

      inspectedEl.removeAttribute('inspect-spin');
      inspectedOriginal.parent.appendChild(inspectedEl);
      inspectedEl.setAttribute('position', inspectedOriginal.position);
      inspectedEl.setAttribute('rotation', inspectedOriginal.rotation);
      inspectedEl.setAttribute('scale', inspectedOriginal.scale);

      inspectActive = false;
      inspectedEl = null;
      inspectedOriginal = null;
      document.querySelector('#inspectPanel').setAttribute('visible', 'false');
      showMessage('Produto devolvido.', 1400);
    }

    AFRAME.registerComponent('inspect-spin', {
      tick: function (time, delta) {
        const rot = this.el.getAttribute('rotation');
        this.el.setAttribute('rotation', {
          x: rot.x,
          y: rot.y + (24 * delta / 1000),
          z: rot.z
        });
      }
    });

    AFRAME.registerComponent('float-rotate', {
      schema: { yoffset: { default: 0.025 }, speed: { default: 1.0 }, rot: { default: 8 } },
      init: function () {
        this.baseY = this.el.object3D.position.y;
      },
      tick: function (time, delta) {
        if (inspectActive && inspectedEl === this.el) return;
        const p = this.el.object3D.position;
        p.y = this.baseY + Math.sin(time / 700 * this.data.speed) * this.data.yoffset;

        const r = this.el.getAttribute('rotation');
        this.el.setAttribute('rotation', {
          x: r.x,
          y: r.y + (this.data.rot * delta / 1000),
          z: r.z
        });
      }
    });

    AFRAME.registerComponent('soft-pulse-light', {
      schema: { min: { default: 0.05 }, max: { default: 0.16 }, speed: { default: 1.2 } },
      tick: function (time) {
        const intensity = this.data.min + ((Math.sin(time / 500 * this.data.speed) + 1) / 2) * (this.data.max - this.data.min);
        this.el.setAttribute('light', 'intensity', intensity);
      }
    });

    AFRAME.registerComponent('product-card', {
      schema: {
        product: { type: 'string' },
        price: { type: 'string' },
        info: { type: 'string' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();
          playSound('#clickSound');

          const productName = this.data.product;
          cart.push(productName);
          cartTotal += productPrices[productName] || 0;

          updateCart();
          setText('#infoTitle', productName);
          setText('#infoBody', this.data.info);
          setText('#selectedPrice', this.data.price);
          setText('#checkoutStatus', 'Produto adicionado ao carrinho');
          showMessage(productName + ' adicionado ao carrinho!');
        });
      }
    });

    AFRAME.registerComponent('inspectable-product', {
      schema: {
        name: { type: 'string' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();
          inspectProduct(this.el, this.data.name);
        });
      }
    });

    AFRAME.registerComponent('assistant-panel', {
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();
          playSound('#clickSound');
          const msg = 'Use o analogico esquerdo para andar. Clique nos produtos para adicionar ao carrinho. Os 3 produtos centrais podem ser exibidos em modo holografico.';
          setText('#assistantSpeech', msg);
          setText('#infoTitle', 'Assistente Virtual');
          setText('#infoBody', msg);
          setText('#selectedPrice', 'Assistente online');
          showMessage('Assistente virtual ativado.');
        });
      }
    });

    AFRAME.registerComponent('assistant-proximity', {
      init: function () {
        this.rig = document.querySelector('#rig');
      },
      tick: function () {
        if (!this.rig) return;
        const rigPos = new AFRAME.THREE.Vector3();
        const assistantPos = new AFRAME.THREE.Vector3();
        this.rig.object3D.getWorldPosition(rigPos);
        this.el.object3D.getWorldPosition(assistantPos);
        const distance = rigPos.distanceTo(assistantPos);

        let state = '';
        let message = '';

        if (distance < 2.1) {
          if (rigPos.z > -4.5) {
            state = 'entrada';
            message = 'Bem-vindo a Loja Moderna VR. Entre e explore a vitrine futurista.';
          } else if (rigPos.z > -8.8) {
            state = 'produtos';
            message = 'Voce esta na area principal. Agora os 3 produtos centrais podem ser exibidos na frente de voce em modo holografico.';
          } else {
            state = 'caixa';
            message = 'Voce esta perto do caixa. Confira o resumo da compra e finalize com pagamento facial.';
          }
        }

        if (state !== '' && state !== lastAssistantState) {
          lastAssistantState = state;
          setText('#assistantSpeech', message);
          setText('#infoTitle', 'Assistente Virtual');
          setText('#infoBody', message);
          setText('#selectedPrice', 'Ajuda automatica');
          showMessage('Assistente: ' + message, 3200);
        }

        if (state === '' && lastAssistantState !== '') {
          lastAssistantState = '';
          setText('#assistantSpeech', 'Aproxime-se para receber orientacoes.');
        }
      }
    });

    AFRAME.registerComponent('assistant-core-pulse', {
      tick: function (time) {
        const scale = 1 + Math.sin(time / 250) * 0.06;
        this.el.setAttribute('scale', `${scale} ${scale} ${scale}`);
      }
    });

    AFRAME.registerComponent('assistant-look', {
      init: function () {
        this.rig = document.querySelector('#rig');
      },
      tick: function () {
        if (!this.rig) return;
        const rigPos = new AFRAME.THREE.Vector3();
        const myPos = new AFRAME.THREE.Vector3();
        this.rig.object3D.getWorldPosition(rigPos);
        this.el.object3D.getWorldPosition(myPos);
        const dx = rigPos.x - myPos.x;
        const dz = rigPos.z - myPos.z;
        const angle = Math.atan2(dx, dz) * 180 / Math.PI;
        this.el.setAttribute('rotation', `0 ${angle} 0`);
      }
    });

    AFRAME.registerComponent('tv-showcase-premium', {
      init: function () {
        this.slides = [
          { title: 'Notebook X-Pro', body: 'Alta performance • R$ 8.499', subtitle: 'Potencia com IA integrada', accent: '#38bdf8' },
          { title: 'Phone Vision', body: 'Camera holografica • R$ 5.999', subtitle: 'Design premium do futuro', accent: '#67e8f9' },
          { title: 'Headphone Neo', body: 'Som imersivo • R$ 1.499', subtitle: 'Audio intenso e elegante', accent: '#a78bfa' },
          { title: 'VR Pod', body: 'Experiencia VR • R$ 3.299', subtitle: 'Tecnologia imersiva portatil', accent: '#14b8a6' }
        ];
        this.index = 0;
        this.lastSwitch = 0;
      },
      tick: function (time) {
        if (time - this.lastSwitch > 2400) {
          this.index = (this.index + 1) % this.slides.length;
          const item = this.slides[this.index];
          setText('#tvTitle', item.title);
          setText('#tvBody', item.body);
          setText('#tvSubtitle', item.subtitle);

          const ids = ['#tvScreen','#tvGlowBar','#tvLine1','#tvLine2','#tvCorner1','#tvCorner2'];
          ids.forEach(id => {
            const el = document.querySelector(id);
            if (el) el.setAttribute('color', item.accent);
          });

          this.lastSwitch = time;
        }
      }
    });

    AFRAME.registerComponent('face-zone', {
      init: function () {
        this.rig = document.querySelector('#rig');
        this.active = false;
      },
      tick: function () {
        if (!this.rig) return;
        const zonePos = new AFRAME.THREE.Vector3();
        const rigPos = new AFRAME.THREE.Vector3();
        this.el.object3D.getWorldPosition(zonePos);
        this.rig.object3D.getWorldPosition(rigPos);
        const d = zonePos.distanceTo(rigPos);

        const ring = document.querySelector('#scanFloorRing');
        const status = document.querySelector('#scanStatus');
        const badge = document.querySelector('#payBadge');

        if (d < 1.65) {
          if (!this.active) {
            this.active = true;
            if (ring) ring.setAttribute('color', '#22c55e');
            if (status) status.setAttribute('value', 'Rosto detectado');
            if (badge) badge.setAttribute('value', 'Autenticacao facial pronta');
            setText('#checkoutStatus', 'Pagamento facial pronto');
            showMessage('Pagamento facial pronto.');
          }
        } else {
          this.active = false;
          if (ring) ring.setAttribute('color', '#86efac');
          if (status) status.setAttribute('value', 'Fique na area verde');
          if (badge) badge.setAttribute('value', 'Pagamento facial');
        }
      }
    });

    AFRAME.registerComponent('finish-purchase', {
      init: function () {
        this.el.addEventListener('click', () => {
          unlockAudioAndPlayAmbient();
          playSound('#buySound');

          if (cart.length === 0) {
            setText('#checkoutStatus', 'Carrinho vazio');
            showMessage('Seu carrinho esta vazio.');
            return;
          }

          setText('#infoTitle', 'Compra aprovada');
          setText('#infoBody', 'Itens comprados: ' + cart.join(', '));
          setText('#selectedPrice', 'Total pago: ' + formatBRL(cartTotal));
          setText('#checkoutStatus', 'Pagamento concluido com sucesso');
          showMessage('Compra finalizada com sucesso!');

          const okBadge = document.querySelector('#approvalBadge');
          const okIcon = document.querySelector('#approvalIcon');
          const okText = document.querySelector('#approvalText');

          if (okBadge) okBadge.setAttribute('visible', 'true');
          if (okIcon) okIcon.setAttribute('visible', 'true');
          if (okText) okText.setAttribute('visible', 'true');

          setTimeout(() => {
            if (okBadge) okBadge.setAttribute('visible', 'false');
            if (okIcon) okIcon.setAttribute('visible', 'false');
            if (okText) okText.setAttribute('visible', 'false');
          }, 2200);

          cart = [];
          cartTotal = 0;
          updateCart();
        });
      }
    });

    AFRAME.registerComponent('auto-door', {
      init: function () {
        this.rig = document.querySelector('#rig');
        this.leftDoor = document.querySelector('#leftDoor');
        this.rightDoor = document.querySelector('#rightDoor');
        this.isOpen = false;
      },
      tick: function () {
        if (!this.rig || !this.leftDoor || !this.rightDoor) return;
        const zonePos = new AFRAME.THREE.Vector3();
        const rigPos = new AFRAME.THREE.Vector3();
        this.el.object3D.getWorldPosition(zonePos);
        this.rig.object3D.getWorldPosition(rigPos);
        const d = zonePos.distanceTo(rigPos);

        if (d < 2.8 && !this.isOpen) {
          this.isOpen = true;
          this.leftDoor.setAttribute('animation__open', { property: 'position', to: '-2.15 1.8 2.96', dur: 700, easing: 'easeOutQuad' });
          this.rightDoor.setAttribute('animation__open', { property: 'position', to: '2.15 1.8 2.96', dur: 700, easing: 'easeOutQuad' });
          showMessage('Porta automatica aberta.');
        }

        if (d >= 3.2 && this.isOpen) {
          this.isOpen = false;
          this.leftDoor.setAttribute('animation__close', { property: 'position', to: '-1.02 1.8 2.96', dur: 700, easing: 'easeOutQuad' });
          this.rightDoor.setAttribute('animation__close', { property: 'position', to: '1.02 1.8 2.96', dur: 700, easing: 'easeOutQuad' });
        }
      }
    });

    AFRAME.registerComponent('hover-highlight', {
      schema: { glow: { type: 'selector' } },
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          this.el.setAttribute('scale', '1.06 1.06 1.06');
          if (this.data.glow) this.data.glow.setAttribute('visible', 'true');
        });

        this.el.addEventListener('mouseleave', () => {
          this.el.setAttribute('scale', '1 1 1');
          if (this.data.glow) this.data.glow.setAttribute('visible', 'false');
        });

        this.el.addEventListener('click', () => {
          this.el.setAttribute('animation__pulse', {
            property: 'scale',
            from: '1 1 1',
            to: '1.12 1.12 1.12',
            dur: 140,
            dir: 'alternate',
            loop: 1
          });
        });
      }
    });
  </script>
</head>
<body>
  <a-scene background="color: #06101a">
    <!-- AUDIOS -->
    <a-entity id="ambientSound" sound="src: url(https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8d1d09d.mp3?filename=futuristic-atmosphere-ambient-110997.mp3); autoplay: false; loop: true; volume: 0.25"></a-entity>
    <a-entity id="clickSound" sound="src: url(https://cdn.pixabay.com/download/audio/2022/03/15/audio_7fa882ec58.mp3?filename=click-124467.mp3); autoplay: false; loop: false; volume: 0.6"></a-entity>
    <a-entity id="buySound" sound="src: url(https://cdn.pixabay.com/download/audio/2022/03/10/audio_9420fd61d6.mp3?filename=success-fanfare-trumpets-6185.mp3); autoplay: false; loop: false; volume: 0.55"></a-entity>

    <a-sky color="#06101a"></a-sky>

    <a-light type="ambient" intensity="0.34" color="#d5e3f5"></a-light>

    <a-entity position="-6 4 -2" light="type: point; color: #38bdf8; intensity: 0.16; distance: 18" soft-pulse-light></a-entity>
    <a-entity position="6 4 -2" light="type: point; color: #8b5cf6; intensity: 0.16; distance: 18" soft-pulse-light="speed: 1.4"></a-entity>
    <a-entity position="0 4 -10" light="type: point; color: #14b8a6; intensity: 0.12; distance: 14" soft-pulse-light="speed: 1.3"></a-entity>

    <a-plane position="0 0 3.5" rotation="-90 0 0" width="34" height="20" color="#09111d"></a-plane>
    <a-plane position="0 0 -5" rotation="-90 0 0" width="22" height="18" color="#0f1726"></a-plane>
    <a-plane position="0 0.01 -5" rotation="-90 0 0" width="18.5" height="16.2" color="#0d1728"></a-plane>

    <a-box position="0 0.02 -3.8" width="14.5" height="0.01" depth="0.03" color="#38bdf8"></a-box>
    <a-box position="0 0.02 -6.6" width="14.5" height="0.01" depth="0.03" color="#8b5cf6"></a-box>
    <a-box position="0 0.02 -9.4" width="14.5" height="0.01" depth="0.03" color="#14b8a6"></a-box>

    <a-plane position="0 5 -5" rotation="90 0 0" width="18.5" height="16.2" color="#0a1322"></a-plane>
    <a-box position="-4.6 4.94 -5" width="0.10" height="0.04" depth="14.5" color="#38bdf8"></a-box>
    <a-box position="0 4.94 -5" width="0.10" height="0.04" depth="14.5" color="#8b5cf6"></a-box>
    <a-box position="4.6 4.94 -5" width="0.10" height="0.04" depth="14.5" color="#14b8a6"></a-box>

    <a-box position="0 2.5 -13.1" width="18.5" height="5" depth="0.24" color="#14294f"></a-box>
    <a-box position="-9.25 2.5 -5" width="0.24" height="5" depth="16.2" color="#16396d"></a-box>
    <a-box position="9.25 2.5 -5" width="0.24" height="5" depth="16.2" color="#232f63"></a-box>
    <a-box position="-9.10 2.45 -5" width="0.03" height="4" depth="14" color="#38bdf8"></a-box>
    <a-box position="9.10 2.45 -5" width="0.03" height="4" depth="14" color="#8b5cf6"></a-box>

    <a-box position="0 2.5 3.02" width="18.5" height="5" depth="0.22" color="#091321"></a-box>
    <a-box position="-5.5 2 2.96" width="6" height="3.4" depth="0.04" color="#67e8f9" opacity="0.14"></a-box>
    <a-box position="5.5 2 2.96" width="6" height="3.4" depth="0.04" color="#a78bfa" opacity="0.14"></a-box>

    <a-box id="leftDoor" position="-1.02 1.8 2.96" width="1.8" height="3.25" depth="0.04" color="#7dd3fc" opacity="0.18"></a-box>
    <a-box id="rightDoor" position="1.02 1.8 2.96" width="1.8" height="3.25" depth="0.04" color="#c4b5fd" opacity="0.18"></a-box>
    <a-box position="0 3.45 2.95" width="4.2" height="0.12" depth="0.1" color="#94a3b8"></a-box>
    <a-box position="-2.05 1.8 2.95" width="0.1" height="3.35" depth="0.1" color="#94a3b8"></a-box>
    <a-box position="2.05 1.8 2.95" width="0.1" height="3.35" depth="0.1" color="#94a3b8"></a-box>
    <a-box position="0 1.6 1.2" width="4.6" height="3.0" depth="2.6" opacity="0" auto-door></a-box>

    <a-box position="0 4.35 2.86" width="8.9" height="1.02" depth="0.12" color="#020617"></a-box>
    <a-text value="LOJA MODERNA" position="0 4.22 2.77" align="center" color="#7dd3fc" width="10"></a-text>
    <a-text value="Tecnologia alem do presente" position="0 3.76 2.77" align="center" color="#dce7f7" width="6"></a-text>
    <a-box position="0 0.10 2.84" width="18.5" height="0.04" depth="0.04" color="#38bdf8"></a-box>

    <a-plane position="0 0.02 1.2" rotation="-90 0 0" width="4.8" height="2.8" color="#111827"></a-plane>
    <a-box position="0 0.03 1.2" width="4.5" height="0.02" depth="2.55" color="#22d3ee"></a-box>

    <a-box position="0 2.5 -12.88" width="9.8" height="3.7" depth="0.03" color="#07101d"></a-box>
    <a-ring position="0 2.5 -12.80" radius-inner="0.72" radius-outer="1.02" color="#38bdf8"></a-ring>
    <a-ring position="0 2.5 -12.79" radius-inner="1.20" radius-outer="1.34" color="#8b5cf6"></a-ring>
    <a-text value="EXPERIENCIA IMERSIVA" position="0 4.00 -12.72" align="center" color="#e6eef8" width="7"></a-text>

    <!-- TV -->
    <a-box position="0 2.55 2.82" width="6.1" height="2.55" depth="0.10" color="#01040a"></a-box>
    <a-box position="0 2.55 2.79" width="5.75" height="2.20" depth="0.03" color="#020617"></a-box>
    <a-plane id="tvScreen" position="0 2.55 2.76" width="5.45" height="1.95" color="#0f172a" rotation="0 180 0" material="side: double" tv-showcase-premium></a-plane>
    <a-box id="tvGlowBar" position="0 1.60 2.80" width="4.0" height="0.05" depth="0.04" color="#38bdf8"></a-box>
    <a-box id="tvLine1" position="-1.75 3.34 2.80" width="1.0" height="0.03" depth="0.03" color="#38bdf8"></a-box>
    <a-box id="tvLine2" position="1.75 1.79 2.80" width="1.0" height="0.03" depth="0.03" color="#38bdf8"></a-box>
    <a-box id="tvCorner1" position="-2.55 3.18 2.80" width="0.18" height="0.18" depth="0.03" color="#38bdf8"></a-box>
    <a-box id="tvCorner2" position="2.55 1.92 2.80" width="0.18" height="0.18" depth="0.03" color="#38bdf8"></a-box>
    <a-text id="tvTitle" value="Notebook X-Pro" position="0 2.92 2.70" align="center" color="#ffffff" width="6.3" rotation="0 180 0"></a-text>
    <a-text id="tvBody" value="Alta performance • R$ 8.499" position="0 2.48 2.70" align="center" color="#eef5ff" width="5.2" rotation="0 180 0"></a-text>
    <a-text id="tvSubtitle" value="Potencia com IA integrada" position="0 2.08 2.70" align="center" color="#cbd5e1" width="4.5" rotation="0 180 0"></a-text>

    <!-- Painel de inspeção -->
    <a-entity id="inspectPanel" visible="false">

      <a-text id="checkoutList" value="Nenhum item selecionado" position="-2.05 1.40 0.92" align="center" color="#eef5ff" width="1.9"></a-text>
      <a-text id="checkoutStatus" value="Aguardando compra" position="-2.05 0.88 0.92" align="center" color="#94a3b8" width="1.9"></a-text>

      <a-box position="2.05 1.28 0.80" width="1.65" height="1.45" depth="0.04" color="#111827"></a-box>

    <a-text id="globalMessage" value="Use o analogico para andar. Mire e clique para interagir." position="0 3.25 -1.70" align="center" color="#eef5ff" width="7.4"></a-text>

    <a-entity id="rig" position="0 1.6 5" movement-controls="speed: 0.20; controls: checkpoint, gamepad, keyboard">
      <a-entity id="camera" camera look-controls position="0 0 0">
        <a-entity
          cursor="fuse: true; fuseTimeout: 900"
          raycaster="objects: .clickable, [inspectable-product]"
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.016"
          material="color: white; shader: flat">
        </a-entity>
        <a-entity id="inspectPanel" visible="false"></a-entity>
      </a-entity>

      <a-entity
        id="leftHand"
        laser-controls="hand: left"
        raycaster="objects: .clickable, [inspectable-product]"
        line="color: #7dd3fc"
        thumbstick-controls="target: #rig; speed: 0.20; fly: false">
      </a-entity>

      <a-entity
        id="rightHand"
        laser-controls="hand: right"
        raycaster="objects: .clickable, [inspectable-product]"
        line="color: #c4b5fd">
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    updateCart();

    setInterval(() => {
      setText('#checkoutTotal', cart.length === 0 ? 'Aproxime-se' : formatBRL(cartTotal));
    }, 200);

    document.addEventListener('click', unlockAudioAndPlayAmbient, { once: true });
    document.addEventListener('touchstart', unlockAudioAndPlayAmbient, { once: true });
  </script>
