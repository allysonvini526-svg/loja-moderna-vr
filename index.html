  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    let cart = [];

    function setText(id, value) {
      const el = document.querySelector(id);
      if (el) el.setAttribute('value', value);
    }

    function updateCart() {
      if (cart.length === 0) {
        setText('#cartText', 'Carrinho vazio');
      } else {
        setText('#cartText', 'Carrinho: ' + cart.join(' • '));
      }
    }

    function showMessage(text) {
      setText('#messageText', text);
      clearTimeout(window.msgTimer);
      window.msgTimer = setTimeout(() => {
        setText('#messageText', 'Aponte para produtos ou botoes e aperte o gatilho.');
      }, 2500);
    }

    AFRAME.registerComponent('buy-item', {
      schema: {
        product: { type: 'string' },
        info: { type: 'string' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          cart.push(this.data.product);
          updateCart();
          setText('#infoTitle', this.data.product);
          setText('#infoBody', this.data.info);
          showMessage(this.data.product + ' adicionado ao carrinho!');
        });
      }
    });

    AFRAME.registerComponent('finish-purchase', {
      init: function () {
        this.el.addEventListener('click', () => {
          if (cart.length === 0) {
            showMessage('Seu carrinho esta vazio.');
            return;
          }

          setText('#infoTitle', 'Compra aprovada');
          setText('#infoBody', 'Itens: ' + cart.join(', '));
          showMessage('Compra finalizada com sucesso!');
          cart = [];
          updateCart();

          const ok = document.querySelector('#okBadge');
          if (ok) {
            ok.setAttribute('visible', 'true');
            setTimeout(() => ok.setAttribute('visible', 'false'), 2200);
          }
        });
      }
    });

    AFRAME.registerComponent('assistant-help', {
      init: function () {
        this.el.addEventListener('click', () => {
          setText('#infoTitle', 'Assistente Virtual');
          setText('#infoBody', 'Use o laser do controle para apontar. Aperte o gatilho para adicionar produtos. Va ao caixa para finalizar.');
          showMessage('Assistente virtual ativado.');
        });
      }
    });

    AFRAME.registerComponent('teleport-to', {
      schema: {
        x: { type: 'number' },
        y: { type: 'number', default: 1.6 },
        z: { type: 'number' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          const rig = document.querySelector('#rig');
          if (rig) {
            rig.setAttribute('position', `${this.data.x} ${this.data.y} ${this.data.z}`);
          }
        });
      }
    });

    AFRAME.registerComponent('float-gentle', {
      schema: {
        amount: { default: 0.03 },
        speed: { default: 1.0 }
      },
      init: function () {
        this.baseY = this.el.object3D.position.y;
      },
      tick: function (time) {
        this.el.object3D.position.y =
          this.baseY + Math.sin(time / 700 * this.data.speed) * this.data.amount;
      }
    });
  </script>
